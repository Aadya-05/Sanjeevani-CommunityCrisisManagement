version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: sanjeevani_postgres
    environment:
      POSTGRES_DB: sanjeevani
      POSTGRES_USER: sanjeevani
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/migrations.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanjeevani"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sanjeevani_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "56379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: sanjeevani_backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: sanjeevani_frontend
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: sanjeevani_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: